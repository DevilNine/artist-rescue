<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9333ea" />
      <stop offset="100%" stop-color="#f43f5e" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Shield Shape -->
  <path d="M256 32 C256 32 128 64 64 96 C64 288 128 416 256 480 C384 416 448 288 448 96 C384 64 256 32 256 32 Z" 
        fill="url(#bg)" filter="url(#glow)"/>
  
  <path d="M256 32 C256 32 128 64 64 96 C64 288 128 416 256 480 C384 416 448 288 448 96 C384 64 256 32 256 32 Z" 
        fill="none" stroke="#ffffff" stroke-width="16" stroke-linejoin="round"/>

  <!-- Stylus/Pen and Cross (Rescue) -->
  <g transform="translate(256, 256) rotate(-45) translate(-256, -256)" filter="url(#glow)">
    <path d="M240 160 H272 V296 L256 336 L240 296 Z" fill="#ffffff" />
    <path d="M240 128 H272 V144 H240 Z" fill="#ffffff" opacity="0.8" />
  </g>
  
  <g transform="translate(256, 256) rotate(45) translate(-256, -256)" filter="url(#glow)">
    <path d="M240 160 H272 V336 H240 Z" fill="#ffffff" />
    <!-- Medical cross horizontal bar -->
    <path d="M200 232 H312 V264 H200 Z" fill="#ffffff" />
  </g>
</svg>
