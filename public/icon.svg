<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Artist Rescue">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9a8bff"/>
      <stop offset="1" stop-color="#5b4bd0"/>
    </linearGradient>
    <linearGradient id="nib" x1="256" y1="180" x2="256" y2="328" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7c6cf0"/>
      <stop offset="1" stop-color="#5a49c8"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- App tile -->
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#tile)"/>
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#sheen)"/>

  <!-- Protective shield -->
  <path d="M256 104 L372 148 L372 266 C372 340 322 393 256 418 C190 393 140 340 140 266 L140 148 Z"
        fill="#ffffff" fill-opacity="0.97"/>

  <!-- Pen nib (art) -->
  <path d="M212 196 L300 196 L256 322 Z" fill="url(#nib)"/>
  <path d="M251 214 L261 214 L256 316 Z" fill="#ffffff"/>
  <circle cx="256" cy="232" r="13" fill="#ffffff"/>
</svg>
